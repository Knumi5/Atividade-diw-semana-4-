<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meu Projeto</title>
    <!-- ✅ Fontes corretas -->
    <link href="https://fonts.googleapis.com/css2?family=Inter&family=Playfair+Display&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- ✅ Classe bate com CSS -->
    <header class="header-fixo">
        <div class="container-menu">
            <nav class="menu-navegação">
                <!-- ✅ Classe adicionada -->
                <ul class="lista-menu">
                    <!-- ✅ Classes adicionadas nos links -->
                    <li><a href="#" class="item-menu">Home</a></li>
                    <li><a href="#" class="item-menu">Sobre</a></li>
                    <li><a href="#" class="item-menu">Contato</a></li>

                    <form id="form-pesquisa">
                        <div class="campo">
                            <label for="termo">Termo de Pesquisa</label>
                            <input type="text" id="termo" name="termo" placeholder="Digite sua pesquisa">
                            <select id="categoria" name="categoria">
                                <option value="">Selecione uma categoria</option>
                                <option value="livro">Livro</option>
                                <option value="autor">Autor</option>
                                <option value="editora">Editora</option>
                                <option value="">Selecione um tema</option>
                                <option value="distopia">Distopia</option>
                                <option value="romance">Romance</option>
                                <option value="sci-fi">Sci-fi</option>
                                <option value="misterio">Mistério</option>
                            </select>
                        </div>
                    </form>
                        <button type="submit">Buscar</button>
                    </form>
                    <form id="form-newsletter">
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" name="nome" placeholder="Digite teu nome">
                        <input type="email" id="email" name="email" placeholder="Digite teu e-mail">
                        <div class="campo checkbox">
                        <label for="consentimento">
                        <input type="checkbox" id="consentimento" name="consentimento">
                        Aceito receber newsletters
                        </label>
                        </div>
                    </form>
                </ul>
            </nav>
        </div>
    </header>

    <section class="hero-section">
        <h1>Bem-vindo ao Meu Projeto</h1>
    </section>

    <section class="sobre-o-projeto">
        <h2>Sobre o Projeto</h2>
        <p>Esta é uma seção sobre o projeto.</p>
    </section>

    <article class="card-autor">
        <img src="public/assets/wireframe.png" alt="Foto do autor">
        <h3>Nome do Autor</h3>
        <p>Biografia do autor</p>
    </article>

    <article class="card-livro">
        <!-- ✅ Tag img fechada corretamente -->
        <img src="public/assets/wireframe.png" alt="Título do Livro">
        <h3>Título do Livro</h3>
        <p>Descrição do livro</p>
        <a href="#">Saiba mais</a>
    </article>
</body>
</html>
